<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="1024">
    <meta name="viewport" content="width=1080, height=1920">
    <title>全屏图片 - 1080x1920</title>
    <!-- Google Fonts - 中文字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Noto+Serif+SC:wght@400;700;900&family=Liu+Jian+Mao+Cao&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { width: 1080px; height: 1920px; overflow: hidden; }

        body {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #fff;
            position: relative;
            background: transparent; /* 移除黑色背景 */
        }

        /* 背景使用图片并做模糊处理，完全覆盖整个页面 */
        .bg {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url("{{image}}");
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        .title-group {
    position: absolute;
    top: 240px;
    left: 50%;
    transform: translateX(-50%);
    width: 86%;
    text-align: center;
    z-index: 2;
}

.title {

    font-size: 96px;
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: 6px;

    color: #ffffff;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;

    /* 图中 1：白字 + 粗黑描边 + 轻微阴影 */
    -webkit-text-stroke: 5px #000000;
    paint-order: stroke fill;

    text-shadow:
        0 4px 0 #000,
        0 8px 14px rgba(0, 0, 0, 0.75);

}

.book-author {
    margin-top: 24px;
    font-size: 50px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: 4px;
    color: #ffffff;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
    -webkit-text-stroke: 2px #000000;
    paint-order: stroke fill;
    text-shadow:
        0 2px 0 #000,
        0 5px 10px rgba(0, 0, 0, 0.72);
}

.book-author:empty {
    display: none;
}

.text {
    position: absolute;
    bottom: 300px;
    left: 50%;
    transform: translateX(-50%);
    width: 76%;
    padding: 0 30px;
    text-align: center;

    font-size: 58px;
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: 4px;

    color: #ffffff;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;

    /* 图中 2：白字 + 黑描边，标题感更强 */
    -webkit-text-stroke: 4px #000000;
    paint-order: stroke fill;

    text-shadow:
        0 3px 0 #000,
        0 7px 12px rgba(0, 0, 0, 0.75);

    z-index: 2;
}

        /* Footer */
        .footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            padding: 25px 20px 0 20px;
            position: absolute;
            bottom: 20px;
            color: #fff;
            text-shadow: -1px -1px 0 #000,
                        1px -1px 0 #000,
                        -1px 1px 0 #000,
                        1px 1px 0 #000;
        }
        
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 500;
        }
        
        .logo-marks {
            display: flex;
            gap: 5px;
        }
        
        .logo-mark {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(149, 165, 166, 0.45);
        }
        
        .logo-mark.active {
            background: rgba(149, 165, 166, 0.75);
        }
    </style>
</head>
<body>
    <div class="bg">
    <div class="title-group">
        <div class="title">《{{title}}》</div>
        <div class="book-author">{{author}}</div>
    </div>
    <div class="text">{{text}}</div>
    </div>
    <div class="footer">
        <div class="logo-section">
            <div class="logo">{{brand=Pixelle-Video}}</div>
            <div class="logo-marks">
                <div class="logo-mark"></div>
                <div class="logo-mark active"></div>
                <div class="logo-mark"></div>
                <div class="logo-mark"></div>
            </div>
        </div>
    </div>
</body>
</html>
