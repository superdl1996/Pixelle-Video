# Pixelle-Video Configuration
# Copy this file to config.yaml and fill in your settings
# ⚠️ Never commit config.yaml to Git!

project_name: Pixelle-Video

# ==================== LLM Configuration ====================
# Supports any OpenAI SDK compatible API
llm:
  api_key: ""
  base_url: ""
  model: ""

# Popular presets:
# Qwen Max:        base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"  model: "qwen-max"
# OpenAI GPT-4o:   base_url: "https://api.openai.com/v1"                          model: "gpt-4o"
# DeepSeek:        base_url: "https://api.deepseek.com"                           model: "deepseek-chat"
# Ollama (Local):  base_url: "http://localhost:11434/v1"                          model: "llama3.2"

# ==================== Direct API Provider Configuration ====================
# Optional: use providers directly for image/video/VLM generation without ComfyUI workflows.
api_providers:
  common:
    print_model_input: false
    local_proxy: ""
  openai:
    api_key: ""
    base_url: "https://api.openai.com/v1"
    use_proxy: false
  dashscope:
    api_key: ""
    base_url: "https://dashscope.aliyuncs.com/api/v1"
    use_proxy: false
  ark:
    api_key: ""
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    use_proxy: false
  kling:
    base_url: "https://api-beijing.klingai.com"
    access_key: ""
    secret_key: ""
    use_proxy: false

# ==================== ComfyUI Configuration ====================
comfyui:
  # Global ComfyUI settings
  comfyui_url: http://127.0.0.1:8188  # ComfyUI server URL (required for selfhost workflows)
  comfyui_api_key: ""  # ComfyUI API key (optional, get from https://platform.comfy.org/profile/api-keys)
  # Note for Docker users: Use host.docker.internal:8188 (Mac/Windows) or host IP address (Linux)
  runninghub_api_key: ""  # RunningHub API key (required for runninghub workflows)
  runninghub_concurrent_limit: 1  # Concurrent execution limit for RunningHub (1-10, default 1 for regular members)
  
  # TTS-specific configuration
  tts:
    default_workflow: selfhost/tts_edge.json  # TTS workflow to use
  
  # Image-specific configuration
  image:
    # Required: Default workflow to use (no fallback)
    # Options: runninghub/image_flux.json (recommended, no local setup)
    #          selfhost/image_flux.json (requires local ComfyUI)
    default_workflow: runninghub/image_flux.json
    
    # Image prompt prefix (optional)
    prompt_prefix: "Minimalist black-and-white matchstick figure style illustration, clean lines, simple sketch style"
  
  # Video-specific configuration
  video:
    # Required: Default workflow to use (no fallback)
    # Options: runninghub/video_wan2.1_fusionx.json (recommended, no local setup)
    #          selfhost/video_wan2.1_fusionx.json (requires local ComfyUI)
    default_workflow: runninghub/video_wan2.1_fusionx.json
    
    # Video prompt prefix (optional)
    prompt_prefix: "Minimalist black-and-white matchstick figure style illustration, clean lines, simple sketch style"

# ==================== Template Configuration ====================
# Configure default template for video generation
template:
  # Default frame template to use when not explicitly specified
  # Determines video aspect ratio and layout style
  # Template naming convention:
  #   - static_*.html: Static style templates (no AI-generated media)
  #   - image_*.html: Templates requiring AI-generated images
  #   - video_*.html: Templates requiring AI-generated videos
  # Options: 
  #   - 1080x1920 (vertical/portrait): image_default.html, image_modern.html, image_elegant.html, static_simple.html, etc.
  #   - 1080x1080 (square): image_minimal_framed.html, etc.
  #   - 1920x1080 (horizontal/landscape): image_film.html, image_full.html, etc.
  # See templates/ directory for all available templates
  default_template: "1080x1920/image_default.html"

# ==================== Web UI Saved Page Configuration ====================
# The Web UI can save page selections here. You can also edit these values manually.
web_ui:
  # SelfHost workflow warning popups already shown. Clear this list to show them again.
  dismissed_selfhost_workflow_warnings: []
  quick_create:
    # Enable batch generation mode on the Quick Create page.
    batch_mode: false
    # Single-video processing mode: generate = AI creation, fixed = user-provided script.
    mode: "generate"
    # Automatically fill the text input and title from variable templates.
    auto_template_enabled: true
    # Value used to replace $title in templates, e.g. "Lifelong Growth".
    template_variable: ""
    # Text template for the generated topic/script prompt. $title will be replaced by template_variable.
    text_template: "$title 的书评,整体要根据分镜总时长评论完整,不要戛然而止,必须以 今天要分享的是 $title ,为视频开头,并且占用一个分镜"
    # Single-video input text. In generate mode this is the topic; in fixed mode this is the script.
    text: ""
    # Optional single-video title.
    title: ""
    # Split mode for fixed scripts: paragraph, line, or sentence.
    split_mode: "paragraph"
    # Number of scenes, range 3-30.
    n_scenes: 5
    # Batch topics, one per line.
    topics_text: ""
    # Optional title prefix for batch mode.
    title_prefix: ""
    # BGM filename from bgm/ or data/bgm/. Set to null to disable BGM.
    bgm_path: "default.mp3"
    # BGM volume, range 0.0-0.5.
    bgm_volume: 0.2
    # TTS mode: local or comfyui.
    tts_inference_mode: "local"
    # Edge TTS voice ID used by local TTS mode.
    tts_voice: "zh-CN-YunjianNeural"
    # Edge TTS speed used by local TTS mode, range 0.5-2.0.
    tts_speed: 1.2
    # ComfyUI TTS workflow key used by comfyui TTS mode.
    tts_workflow: null
    # Template type: static, image, or video.
    template_type: "image"
    # Selected frame template path.
    frame_template: "1080x1920/image_default.html"
    # Template custom parameters. Keys are defined by the selected HTML template.
    template_params: {}
    # Selected image/video media workflow key.
    media_workflow: null
    # Use manual media size instead of the selected template media size.
    media_size_override_enabled: false
    # Manual media width/height used when media_size_override_enabled is true.
    media_width: null
    media_height: null
    # Prompt prefix used by media generation on this page.
    prompt_prefix: ""
    # Enable custom prompt template for generating per-scene image prompts from narrations.
    image_prompt_rewrite_enabled: false
    # Custom image prompt rewrite template. When enabled in the Web UI and empty, the default system template is filled automatically.
    image_prompt_rewrite_prompt: ""
